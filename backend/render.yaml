services:
  - type: web
    name: eluno-oms-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m app.seed"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eluno-oms-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: eluno-oms-db
    plan: free
